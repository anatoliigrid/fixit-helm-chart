---
# Source: fixit-chart/templates/service.yaml
apiVersion: v1

kind: Service

metadata:

  name: fixit-service

  labels:

    app: fixit

    chart: fixit-chart-0.1.0

    release: fixit

spec:

  type: NodePort

  selector:

    app: fixit

  ports:

  - port: 8080

    targetPort: 8080

    nodePort: 30080
---
# Source: fixit-chart/templates/deployment.yaml
apiVersion: apps/v1

kind: Deployment

metadata:

  name: fixit-deployment

  labels:

    app: fixit

    chart: fixit-chart-0.1.0

    release: fixit

spec:

  replicas: 3

  selector:

    matchLabels:

      app: fixit

  template:

    metadata:

      labels:

        app: fixit

        release: fixit

    spec:

      containers:

      - name: fixit-container

        image: vilkinss/fixit:latest

        imagePullPolicy: Never

        ports:

        - containerPort: 8080

        resources:

          limits:

            cpu: 500m

            memory: 512Mi

          requests:

            cpu: 250m

            memory: 256Mi
