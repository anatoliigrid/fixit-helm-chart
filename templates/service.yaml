apiVersion: v1

kind: Service

metadata:

  name: {{ .Values.appName }}-service

  labels:

    app: {{ .Values.appName }}

    chart: {{ .Chart.Name }}-{{ .Chart.Version }}

    release: {{ .Release.Name }}

spec:

  type: {{ .Values.service.type }}

  selector:

    app: {{ .Values.appName }}

  ports:

  - port: {{ .Values.service.port }}

    targetPort: {{ .Values.service.targetPort }}

    nodePort: {{ .Values.service.nodePort }}
